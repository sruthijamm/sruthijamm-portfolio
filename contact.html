<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Sruthi Jammalamadaka</title>
  <link rel="shortcut icon" href="./assets/images/sruthi_icon2.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main>

    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/sruthi_icon2.png" alt="Sruthi Jammalamadaka" width="80">
        </figure>
        <div class="info-content">
          <h1 class="name" title="Sruthi Jammalamadaka">Sruthi Jammalamadaka</h1>
          <p class="title">Software Dev → AI & Data Science</p>
        </div>
        <button class="info_more-btn" data-sidebar-btn>
          <span>Show Contacts</span>
          <ion-icon name="chevron-down"></ion-icon>
        </button>
      </div>
      <div class="sidebar-info_more">
        <div class="separator"></div>
        <ul class="contacts-list">
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="mail-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Email</p>
              <a href="mailto:sruthijamm@gmail.com" class="contact-link">sruthijamm@gmail.com</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="document"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Resume</p>
              <a href="assets/SruthiJammResume.pdf" class="resume-link" target="_blank">Download My Resume</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="calendar-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Years of Experience</p>
              <time>2+ Years</time>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="location-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Location</p>
              <address>Toronto, Ontario, CA</address>
            </div>
          </li>
        </ul>
        <div class="separator"></div>
        <ul class="social-list">
          <li class="social-item">
            <a href="https://github.com/sruthijamm" class="social-link"><ion-icon name="logo-github"></ion-icon></a>
          </li>
          <li class="social-item">
            <a href="https://www.linkedin.com/in/sruthijamm/" class="social-link"><ion-icon name="logo-linkedin"></ion-icon></a>
          </li>
        </ul>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><a href="index.html" class="navbar-link">About</a></li>
          <li class="navbar-item"><a href="resume.html" class="navbar-link">Resume</a></li>
          <li class="navbar-item"><a href="projects.html" class="navbar-link">Projects</a></li>
          <li class="navbar-item"><a href="blog.html" class="navbar-link">Blogs</a></li>
          <li class="navbar-item"><a href="contact.html" class="navbar-link active">Contact</a></li>
        </ul>
      </nav>

      <article class="contact active" data-page="contact">
        <header>
          <h2 class="h2 article-title">Contact</h2>
        </header>

        <section class="mapbox" data-mapbox>
          <figure>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d184551.90977221946!2d-79.54286729954762!3d43.71837095821074!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89d4cb90d7c63ba5%3A0x323555502ab4c477!2sToronto%2C%20ON!5e0!3m2!1sen!2sca!4v1772402714218!5m2!1sen!2sca"
              width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </figure>
        </section>

        <section class="contact-form">
          <h3 class="h3 form-title">Contact Form</h3>

          <form action="https://formspree.io/f/mlgwkzyq" method="POST" class="form" data-form id="contact-form">
            <input type="hidden" name="_subject" value="New message from portfolio site">
            <input type="hidden" name="_template" value="table">
            <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

            <div class="input-wrapper">
              <input type="text" name="Full Name" class="form-input" placeholder="Your Full Name" required data-form-input>
              <input type="email" name="Email" class="form-input" placeholder="Your Email Address" required data-form-input>
            </div>

            <textarea name="Message" class="form-input" placeholder="Your Message" required data-form-input></textarea>

            <button class="form-btn" type="submit" disabled data-form-btn>
              <ion-icon name="paper-plane"></ion-icon>
              <span>Send Message</span>
            </button>

            <p id="form-status" class="form-status" aria-live="polite"></p>
          </form>
        </section>

      </article>
    </div>
  </main>

  <script src="./assets/js/script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
